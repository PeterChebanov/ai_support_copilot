name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Unit tests
        run: uv run pytest -v

  smoke:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Create env file
        run: cp .env.example .env

      - name: Start stack
        run: docker compose up -d --build --wait

      - name: Smoke health endpoints
        run: |
          curl -sf http://localhost:8000/health
          curl -sf http://localhost:8000/ready

      - name: Ingest sample docs
        run: |
          docker compose exec -T api uv run python -m ingestion.cli ingest data/sample/faq.md
          docker compose exec -T api uv run python -m ingestion.cli ingest data/sample/policies.md

      - name: Smoke ask endpoint shape
        run: |
          curl -sf -X POST http://localhost:8000/ask \
            -H "Content-Type: application/json" \
            -d '{"query": "What is the refund policy?"}' | grep -q '"answer"'

  eval-regression:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Regression gate on committed baseline
        run: uv run python -m eval.regression
